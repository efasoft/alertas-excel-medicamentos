name: Alertas Medicamentos

on:
  schedule:
    # Ejecutar todos los días a las 8:00 AM (UTC)
    - cron: '0 8 * * *'
  workflow_dispatch:  # Permitir ejecución manual
  push:
    branches:
      - main

jobs:
  enviar-alertas:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v4
    
    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install openpyxl Pillow requests
    
    - name: Verificar archivos
      run: |
        echo "Verificando archivos necesarios..."
        ls -la
        if [ ! -f "alerta_medicamentos.py" ]; then
          echo "ERROR: No se encuentra alerta_medicamentos.py"
          exit 1
        fi
        if [ ! -f "control_de_medicamentos.xlsx" ]; then
          echo "ERROR: No se encuentra control_de_medicamentos.xlsx"
          exit 1
        fi
        echo "✓ Archivos encontrados"
    
    - name: Ejecutar script de alertas
      env:
        GMAIL_USUARIO: ${{ secrets.GMAIL_USUARIO }}
        GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
        EMAIL_DESTINO: ${{ secrets.EMAIL_DESTINO }}
        WHATSAPP_API_KEY: ${{ secrets.WHATSAPP_API_KEY }}
      run: |
        echo "Ejecutando sistema de alertas..."
        python alerta_medicamentos.py
        echo "✓ Script ejecutado correctamente"
